<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d0d18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="時間帳本">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>時間帳本</title>
  <style>
    :root {
      --bg:#0d0d18; --bg2:#13131f; --bg3:#1c1c2e;
      --border:#222238; --text:#eeeef5; --text2:#6666aa;
      --c-pos:#4cdc7a; --c-neg:#ff5252; --c-psy:#ab7ae0;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:-apple-system,'PingFang TC','Noto Sans TC',sans-serif; max-width:480px; margin:0 auto; min-height:100vh; padding-bottom:60px; }

    /* Header */
    .header { padding:18px 20px 10px; }
    .header h1 { font-size:15px; font-weight:700; letter-spacing:.3px; color:var(--text2); }
    .header h1 span { color:var(--c-psy); }
    .sync-info { font-size:11px; color:var(--text2); margin-top:3px; opacity:.7; }

    /* Tabs */
    .tabs { display:flex; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg); z-index:10; }
    .tab-btn { flex:1; padding:12px 0; background:none; border:none; color:var(--text2); font-size:13px; cursor:pointer; position:relative; transition:color .2s; }
    .tab-btn.active { color:var(--text); font-weight:600; }
    .tab-btn.active::after { content:''; position:absolute; bottom:0; left:20%; width:60%; height:2px; background:var(--c-psy); border-radius:1px; }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* ── 帳本 ───────────────────────────────────── */

    .yesterday-banner { background:rgba(102,102,170,.12); padding:9px 20px; font-size:12px; color:var(--text2); text-align:center; border-bottom:1px solid var(--border); }

    /* Hero */
    .hero { padding:28px 20px 20px; border-bottom:1px solid var(--border); }
    .hero-date { font-size:12px; color:var(--text2); margin-bottom:12px; }
    .hero-score { font-size:80px; font-weight:900; letter-spacing:-4px; line-height:1; margin-bottom:10px; }
    .hero-grade-row { display:flex; align-items:center; gap:10px; margin-bottom:20px; }
    .hero-grade-chip { padding:3px 12px; border-radius:20px; font-size:14px; font-weight:800; }
    .hero-grade-label { font-size:13px; color:var(--text2); }
    .hero-drivers { display:flex; flex-direction:column; gap:7px; margin-bottom:20px; padding:13px 14px; background:var(--bg3); border-radius:10px; }
    .driver-row { display:flex; align-items:center; gap:8px; font-size:13px; line-height:1.3; }
    .hero-meta { display:flex; padding-top:16px; border-top:1px solid var(--border); }
    .hero-meta-item { flex:1; text-align:center; }
    .hero-meta-item + .hero-meta-item { border-left:1px solid var(--border); }
    .hm-val { font-size:15px; font-weight:700; margin-bottom:3px; }
    .hm-key { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; }

    /* Stats row */
    .stats-row { display:flex; border-bottom:1px solid var(--border); }
    .stat-blk { flex:1; padding:13px 20px; }
    .stat-blk + .stat-blk { border-left:1px solid var(--border); }
    .stat-v { font-size:19px; font-weight:700; margin-bottom:2px; }
    .stat-k { font-size:10px; color:var(--text2); letter-spacing:.3px; }

    /* Detail toggle */
    .detail-toggle { display:flex; justify-content:center; align-items:center; gap:6px; padding:11px 20px; border-bottom:1px solid var(--border); cursor:pointer; font-size:12px; color:var(--text2); user-select:none; transition:background .15s; }
    .detail-toggle:active { background:var(--bg2); }
    .toggle-arrow { font-size:10px; transition:transform .2s; }
    .toggle-arrow.open { transform:rotate(180deg); }

    /* Dim breakdown */
    .dim-section { padding:18px 20px; border-bottom:1px solid var(--border); }
    .section-lbl { font-size:10px; color:var(--text2); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:16px; }
    .dim-item { display:flex; align-items:center; gap:10px; padding:7px 0; }
    .dim-lbl { width:76px; flex-shrink:0; display:flex; align-items:center; gap:6px; }
    .dim-lbl-icon { font-size:15px; }
    .dim-lbl-name { font-size:12px; font-weight:600; }
    .dim-bar-bg { flex:1; height:5px; background:var(--bg3); border-radius:3px; overflow:hidden; }
    .dim-bar    { height:100%; border-radius:3px; transition:width .5s ease; }
    .dim-right  { flex-shrink:0; text-align:right; min-width:64px; }
    .dim-val  { font-size:13px; font-weight:700; }
    .dim-meta { font-size:10px; color:var(--text2); margin-top:1px; }

    /* Transactions */
    .tx-wrap { padding:0 20px 8px; }
    .tx-hdr { display:flex; justify-content:space-between; align-items:center; padding:16px 0 10px; }
    .tx-hdr.border-top { border-top:1px solid var(--border); }
    .tx-hdr-name  { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; }
    .tx-hdr-total { font-size:14px; font-weight:700; }
    .tx-row { display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--border); }
    .tx-row:last-child { border-bottom:none; }
    .tx-icon   { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
    .tx-body   { flex:1; min-width:0; }
    .tx-name   { font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .tx-meta   { font-size:11px; color:var(--text2); margin-top:2px; }
    .tx-amount { font-size:15px; font-weight:700; flex-shrink:0; }

    /* Manual */
    .manual-wrap { padding:14px 20px; }
    .manual-btn { width:100%; padding:13px; background:var(--bg2); border:1px dashed var(--border); border-radius:12px; color:var(--text2); font-size:13px; cursor:pointer; transition:all .15s; text-align:center; }
    .manual-btn:active { border-color:var(--c-psy); color:var(--text); }
    .manual-form { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:16px; margin-top:8px; }
    .mf-title { font-size:12px; color:var(--text2); letter-spacing:1px; margin-bottom:12px; }
    .mf-dim-row { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:14px; }
    .mf-dim-btn { padding:6px 10px; border-radius:10px; font-size:12px; background:var(--bg3); border:1px solid var(--border); color:var(--text2); cursor:pointer; transition:all .15s; }
    .mf-dim-btn.active { color:var(--text); font-weight:600; }
    .mf-min-row { display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:14px; }
    .mf-step { width:36px; height:36px; border-radius:50%; background:var(--bg3); border:1px solid var(--border); color:var(--text); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .mf-step:active { background:var(--border); }
    .mf-val { font-size:22px; font-weight:700; min-width:70px; text-align:center; }
    .mf-submit { width:100%; padding:12px; background:var(--c-psy); border:none; border-radius:10px; color:#fff; font-size:14px; font-weight:600; cursor:pointer; }
    .mf-submit:disabled { opacity:.4; cursor:default; }

    /* ── 技能樹 ──────────────────────────────────── */
    .skill-wrap { padding:16px; }
    .skill-section { margin-bottom:22px; }
    .skill-section-title { font-size:13px; font-weight:700; margin-bottom:12px; display:flex; align-items:baseline; gap:8px; }
    .skill-chain { display:flex; align-items:center; overflow-x:auto; padding-bottom:4px; }
    .skill-node { display:flex; flex-direction:column; align-items:center; gap:4px; min-width:72px; }
    .node-circle { width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:22px; border:2px solid var(--border); background:var(--bg3); transition:all .4s; }
    .node-circle.unlocked { border-color:currentColor; background:color-mix(in srgb,currentColor 15%,transparent); box-shadow:0 0 14px color-mix(in srgb,currentColor 40%,transparent); }
    .node-circle.active { border-color:currentColor; animation:pulse 2s ease-in-out infinite; }
    .node-circle.locked { opacity:.3; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 color-mix(in srgb,currentColor 40%,transparent)}50%{box-shadow:0 0 0 8px transparent} }
    .node-name { font-size:11px; text-align:center; line-height:1.2; }
    .node-req  { font-size:10px; color:var(--text2); text-align:center; }
    .node-prog { width:44px; height:3px; background:var(--bg3); border-radius:2px; overflow:hidden; }
    .node-prog-fill { height:100%; border-radius:2px; }
    .skill-conn { width:24px; height:2px; background:var(--border); flex-shrink:0; }

    /* ── 報表 ────────────────────────────────────── */
    .report-pad { padding:14px 16px; }
    .period-row { display:flex; gap:6px; margin-bottom:14px; }
    .period-pill { flex:1; padding:9px 0; border-radius:10px; font-size:13px; font-weight:500; background:var(--bg2); border:1px solid var(--border); color:var(--text2); cursor:pointer; text-align:center; transition:all .15s; }
    .period-pill.active { background:var(--bg3); border-color:var(--c-psy); color:var(--text); font-weight:600; }
    .donut-card { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:12px; }
    .donut-wrap { display:flex; justify-content:center; margin:4px 0 18px; }
    .legend-list { display:flex; flex-direction:column; }
    .legend-row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
    .legend-row:last-child { border-bottom:none; }
    .l-dot  { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
    .l-dim  { flex:1; font-size:13px; }
    .l-pct  { font-size:14px; font-weight:700; min-width:38px; text-align:right; }
    .l-time { font-size:13px; color:var(--text2); min-width:58px; text-align:right; }
    .chart-card { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:12px; }
    .chart-title { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:14px; }
    .chart-legend { display:flex; flex-wrap:wrap; gap:5px 12px; margin-bottom:14px; }
    .chart-leg-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text2); }
    .chart-leg-dot { width:9px; height:9px; border-radius:2px; flex-shrink:0; }
    .hbar-row { display:flex; align-items:center; gap:8px; margin-bottom:9px; }
    .hbar-row:last-child { margin-bottom:0; }
    .hbar-label { font-size:11px; color:var(--text2); width:32px; flex-shrink:0; text-align:right; }
    .hbar-track { flex:1; height:20px; background:var(--bg3); border-radius:5px; overflow:hidden; display:flex; }
    .hbar-seg { height:100%; }
    .hbar-total { font-size:11px; color:var(--text); width:46px; flex-shrink:0; text-align:right; font-weight:600; }

    /* ── 設定 ────────────────────────────────────── */
    .settings-pad { padding:14px 16px; }
    .card { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:14px; margin-bottom:12px; }
    .card-title { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:12px; }
    .s-app { padding:14px 0; border-bottom:1px solid var(--border); }
    .s-app:last-child { border-bottom:none; }
    .s-row1 { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .s-name-block { flex:1; min-width:0; }
    .s-name  { font-size:14px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .s-usage { font-size:11px; color:var(--text2); margin-top:1px; }
    .dim-pills { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
    .dim-pill { padding:4px 9px; border-radius:12px; font-size:12px; font-weight:500; background:var(--bg3); border:1px solid var(--border); color:var(--text2); cursor:pointer; transition:all .15s; white-space:nowrap; }
    .dim-pill.active { color:var(--text); border-color:currentColor; background:color-mix(in srgb,currentColor 18%,transparent); }
    .dim-pill.skip-pill.active { color:var(--text2); border-color:var(--text2); background:var(--bg3); }
    .type-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .type-pill { padding:4px 11px; border-radius:12px; font-size:12px; background:var(--bg3); border:1px solid var(--border); color:var(--text2); cursor:pointer; transition:all .15s; }
    .type-pill.active { color:var(--text); border-color:var(--text); background:var(--border); font-weight:600; }
    .step-btn { width:26px; height:26px; border-radius:50%; background:var(--bg3); border:1px solid var(--border); color:var(--text); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .step-btn:active { background:var(--border); }
    .lim-val { font-size:13px; font-weight:600; min-width:42px; text-align:center; }
    .goal-set-row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
    .goal-set-row:last-child { border-bottom:none; }
    .goal-set-dim { flex:1; font-size:13px; font-weight:500; }
    .goal-set-val { font-size:13px; font-weight:600; min-width:52px; text-align:center; color:var(--text2); }
    .goal-set-val.active { color:var(--c-pos); }

    /* No data */
    .no-data { text-align:center; padding:50px 20px; color:var(--text2); }
    .no-data h2 { font-size:18px; margin-bottom:8px; color:var(--text); font-weight:700; }
    .no-data code { display:inline-block; margin-top:14px; background:var(--bg3); padding:8px 16px; border-radius:8px; font-size:13px; color:var(--c-psy); }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>時間帳本 × <span>Life RPG</span></h1>
    <div class="sync-info" id="sync-info">讀取中...</div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('today')">帳本</button>
    <button class="tab-btn"        onclick="switchTab('skill')">技能樹</button>
    <button class="tab-btn"        onclick="switchTab('week')">報表</button>
    <button class="tab-btn"        onclick="switchTab('settings')">設定</button>
  </div>
  <div id="panel-today"    class="tab-panel active"></div>
  <div id="panel-skill"    class="tab-panel"></div>
  <div id="panel-week"     class="tab-panel"></div>
  <div id="panel-settings" class="tab-panel"></div>
</div>

<script src="data/today.js"   onerror="window.SCREEN_TIME_DATA=null"></script>
<script src="data/history.js" onerror="window.SCREEN_TIME_HISTORY=null"></script>
<script>
const DIMS    = ['工作','健康','財務','社交','休閒','心理'];
const DIM_COL = { 工作:'#4f9cf9',健康:'#4caf50',財務:'#ffd700',社交:'#f06292',休閒:'#ff7043',心理:'#ec407a' };
const DIM_ICON= { 工作:'💼',健康:'💪',財務:'💰',社交:'👥',休閒:'🎮',心理:'❤️' };

const DEFAULT_LIMITS = {
  'com.burbn.instagram':   { limitMin:300, limitType:'weekly' },
  'com.facebook.Facebook': { limitMin:180, limitType:'weekly' },
  'com.burbn.barcelona':   { limitMin:180, limitType:'weekly' },
  'com.google.ios.youtube':{ limitMin:60,  limitType:'daily'  },
  'com.netmarble.tskgb':   { limitMin:45,  limitType:'daily'  },
  'com.garena.game.kgtw':  { limitMin:45,  limitType:'daily'  },
  'com.netflix.Netflix':   { limitMin:90,  limitType:'daily'  },
  'com.apple.Safari':      { limitMin:60,  limitType:'daily'  },
};

const SK = 'timeTracker_yu3';

const SKILL_DEF = {
  工作:[{name:'學習者',hours:5,icon:'🌱',bonus:'工作+0.2'},{name:'知識者',hours:25,icon:'📖',bonus:'工作+0.5'},{name:'深工達人',hours:75,icon:'🎯',bonus:'工作+1.0'},{name:'心流大師',hours:200,icon:'🔥',bonus:'工作+2.0'}],
  健康:[{name:'起步者',hours:5,icon:'🚶',bonus:'健康+0.2'},{name:'運動習慣',hours:25,icon:'🏃',bonus:'健康+0.5'},{name:'健身達人',hours:75,icon:'💪',bonus:'健康+1.0'},{name:'鐵人',hours:200,icon:'🏆',bonus:'健康+2.0'}],
  財務:[{name:'記帳新手',hours:5,icon:'💳',bonus:'財務+0.2'},{name:'理財者',hours:25,icon:'📊',bonus:'財務+0.5'},{name:'精算師',hours:75,icon:'💰',bonus:'財務+1.0'},{name:'財務主控',hours:200,icon:'🏦',bonus:'財務+2.0'}],
  社交:[{name:'交流者',hours:5,icon:'👥',bonus:'社交+0.2'},{name:'人際達人',hours:25,icon:'🤝',bonus:'社交+0.5'},{name:'社群樞紐',hours:75,icon:'🌟',bonus:'社交+1.0'},{name:'人脈王',hours:200,icon:'👑',bonus:'社交+2.0'}],
  休閒:[{name:'玩家',hours:5,icon:'🎮',bonus:'休閒+0.2'},{name:'娛樂者',hours:25,icon:'🎬',bonus:'休閒+0.5'},{name:'休閒達人',hours:75,icon:'🎯',bonus:'休閒+1.0'},{name:'生活玩家',hours:200,icon:'🏆',bonus:'休閒+2.0'}],
  心理:[{name:'情緒覺察',hours:5,icon:'❤️',bonus:'心理+0.2'},{name:'心情主人',hours:25,icon:'🎵',bonus:'心理+0.5'},{name:'內心平靜',hours:75,icon:'✨',bonus:'心理+1.0'},{name:'心理大師',hours:200,icon:'🌙',bonus:'心理+2.0'}],
};

let _reportPeriod = 'week';
let _manualDim    = null;
let _manualMin    = 30;
let _showManual   = false;
let _showDetails  = false;

function switchTab(id) {
  ['today','skill','week','settings'].forEach((t,i) => {
    document.querySelectorAll('.tab-btn')[i].classList.toggle('active',t===id);
  });
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
}

function loadStor() { try { return JSON.parse(localStorage.getItem(SK)||'{}'); } catch { return {}; } }
function saveStor(d) { localStorage.setItem(SK,JSON.stringify(d)); }

function getAppConfig(bundle, syncDim, syncPos, stor) {
  const uc = (stor.appConfig||{})[bundle];
  if (uc) return uc;
  const def = DEFAULT_LIMITS[bundle];
  if (syncPos===true)  return { dimension:syncDim, type:'positive', limitMin:30, limitType:'daily' };
  if (syncPos===false) return { dimension:syncDim, type:'negative', limitMin:30, limitType:'daily' };
  if (syncDim) {
    const lt = def?.limitType||(syncDim==='社交'?'weekly':'daily');
    return { dimension:syncDim, type:'limit', limitMin:def?.limitMin??30, limitType:lt };
  }
  return { dimension:null, type:'skip', limitMin:30, limitType:'daily' };
}

function getWeekStart(dateStr) {
  const d=new Date(dateStr), day=d.getDay(), diff=day===0?-6:1-day, mon=new Date(d);
  mon.setDate(d.getDate()+diff); mon.setHours(0,0,0,0); return mon;
}

function getPrevWeekRange(dateStr) {
  const ws = getWeekStart(dateStr);
  const prevEnd = new Date(ws); prevEnd.setDate(ws.getDate()-1);
  const prevStart = getWeekStart(prevEnd.toISOString().slice(0,10));
  return { start: prevStart.toISOString().slice(0,10), end: prevEnd.toISOString().slice(0,10) };
}

function getMetrics(app, stor, weeklyBudget) {
  const cfg = getAppConfig(app.bundle, app.dimension, app.positive, stor);
  const dim = cfg.dimension;
  if (cfg.type==='skip'||!dim) return { pos:0,neg:0,limit:null,dim:null,limitType:null };
  if (cfg.type==='positive') return { pos:app.seconds,neg:0,limit:null,dim,limitType:null };
  if (cfg.type==='negative') return { pos:0,neg:app.seconds,limit:null,dim,limitType:null };
  if (cfg.type==='limit') {
    if (cfg.limitType==='weekly'&&weeklyBudget) {
      const remaining = weeklyBudget[app.bundle]??cfg.limitMin*60;
      const pos=Math.min(app.seconds,Math.max(0,remaining));
      const neg=Math.max(0,app.seconds-pos);
      weeklyBudget[app.bundle]=remaining-pos;
      return { pos,neg,limit:cfg.limitMin*60,dim,limitType:'weekly' };
    } else {
      const limit=cfg.limitMin*60;
      return { pos:Math.min(app.seconds,limit),neg:Math.max(0,app.seconds-limit),limit,dim,limitType:'daily' };
    }
  }
  return { pos:0,neg:0,limit:null,dim:null,limitType:null };
}

function mergeHistory(history, stor) {
  if (!Array.isArray(history)) return;
  stor.dailyPositive = stor.dailyPositive||{};
  stor.dailyNegative = stor.dailyNegative||{};
  const now = new Date();
  const byWeek = {};
  for (const day of history) {
    if (Math.abs(now-new Date(day.date))>90*86400e3) continue;
    const ws = getWeekStart(day.date).toISOString().slice(0,10);
    (byWeek[ws]=byWeek[ws]||[]).push(day);
  }
  for (const weekDays of Object.values(byWeek)) {
    weekDays.sort((a,b)=>a.date.localeCompare(b.date));
    const weeklyBudget={};
    for (const day of weekDays) {
      const dimPos={},dimNeg={}; DIMS.forEach(d=>{dimPos[d]=0;dimNeg[d]=0;});
      for (const app of (day.apps||[])) {
        const m=getMetrics(app,stor,weeklyBudget);
        if (m.dim) { if(m.pos>0) dimPos[m.dim]+=m.pos; if(m.neg>0) dimNeg[m.dim]+=m.neg; }
      }
      stor.dailyPositive[day.date]=dimPos;
      stor.dailyNegative[day.date]=dimNeg;
    }
  }
}

function getSkillHours(stor) {
  const h={}; DIMS.forEach(d=>h[d]=0);
  for (const secs of Object.values(stor.dailyPositive||{}))
    DIMS.forEach(d=>h[d]+=(secs[d]||0)/3600);
  for (const entries of Object.values(stor.manualEntries||{}))
    DIMS.forEach(d=>h[d]+=(entries[d]||0)/3600);
  return h;
}

function getTodayWeeklyContext(todayApps, stor) {
  const today=(window.SCREEN_TIME_DATA||{}).date||new Date().toISOString().slice(0,10);
  const weekStart=getWeekStart(today), todayDate=new Date(today);
  const weekBefore={};
  for (const day of (window.SCREEN_TIME_HISTORY||[])) {
    const d=new Date(day.date);
    if (d>=weekStart&&d<todayDate)
      for (const app of (day.apps||[]))
        weekBefore[app.bundle]=(weekBefore[app.bundle]||0)+app.seconds;
  }
  const ctx={};
  for (const app of (todayApps||[])) {
    const cfg=getAppConfig(app.bundle,app.dimension,app.positive,stor);
    if (cfg.type==='limit'&&cfg.limitType==='weekly')
      ctx[app.bundle]={ weekUsed:(weekBefore[app.bundle]||0)+app.seconds, weekLimit:cfg.limitMin*60 };
  }
  return ctx;
}

function aggregateForPeriod(stor, period) {
  const now=new Date(), today=now.toISOString().slice(0,10);
  let start;
  if      (period==='day')   start=today;
  else if (period==='week')  start=getWeekStart(today).toISOString().slice(0,10);
  else if (period==='month') start=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
  else                       start=`${now.getFullYear()}-01-01`;
  const totals={}; DIMS.forEach(d=>totals[d]=0);
  for (const [date,v] of Object.entries(stor.dailyPositive||{}))
    if (date>=start&&date<=today) DIMS.forEach(d=>totals[d]+=(v[d]||0));
  for (const [date,v] of Object.entries(stor.manualEntries||{}))
    if (date>=start&&date<=today) DIMS.forEach(d=>totals[d]+=(v[d]||0));
  return totals;
}

function getWeekSummary(stor) {
  const today=new Date().toISOString().slice(0,10);
  const weekStart=getWeekStart(today).toISOString().slice(0,10);
  let pos=0, neg=0;
  for (const [date,v] of Object.entries(stor.dailyPositive||{}))
    if (date>=weekStart&&date<=today) DIMS.forEach(d=>pos+=(v[d]||0));
  for (const [date,v] of Object.entries(stor.dailyNegative||{}))
    if (date>=weekStart&&date<=today) DIMS.forEach(d=>neg+=(v[d]||0));
  for (const [date,v] of Object.entries(stor.manualEntries||{}))
    if (date>=weekStart&&date<=today) DIMS.forEach(d=>pos+=(v[d]||0));
  return { pos, neg };
}

function getTrends(stor) {
  const today=new Date().toISOString().slice(0,10);
  const thisWeekStart=getWeekStart(today).toISOString().slice(0,10);
  const { start:prevStart, end:prevEnd }=getPrevWeekRange(today);
  const thisW={}, prevW={}; DIMS.forEach(d=>{thisW[d]=0;prevW[d]=0;});
  for (const [date,v] of Object.entries(stor.dailyPositive||{})) {
    if (date>=thisWeekStart&&date<=today) DIMS.forEach(d=>thisW[d]+=(v[d]||0));
    if (date>=prevStart&&date<=prevEnd)   DIMS.forEach(d=>prevW[d]+=(v[d]||0));
  }
  const arrows={}; DIMS.forEach(d=>{
    if (!prevW[d]) arrows[d]='';
    else if (thisW[d]>prevW[d]*1.1) arrows[d]='↑';
    else if (thisW[d]<prevW[d]*0.9) arrows[d]='↓';
    else arrows[d]='→';
  });
  return arrows;
}

function calcScore(posSec, negSec, dimPos, goals) {
  if (!posSec && !negSec) return null;
  const total = posSec + negSec;
  const efficiency = total > 0 ? posSec / total : 1;
  const setGoals = DIMS.filter(d => (goals[d]||0) > 0);
  const goalRate = setGoals.length > 0
    ? setGoals.filter(d => (dimPos[d]||0) >= (goals[d]||0)*60).length / setGoals.length
    : 0.5;
  return Math.min(100, Math.max(0, Math.round(efficiency * 65 + goalRate * 35)));
}

function getGrade(score) {
  if (score >= 90) return { letter:'S', label:'完美', color:'#ffd700' };
  if (score >= 80) return { letter:'A', label:'優秀', color:'var(--c-pos)' };
  if (score >= 70) return { letter:'B', label:'良好', color:'#4f9cf9' };
  if (score >= 60) return { letter:'C', label:'普通', color:'#ff9800' };
  if (score >= 50) return { letter:'D', label:'待改善', color:'#ff7043' };
  return { letter:'F', label:'需要反省', color:'var(--c-neg)' };
}

function getStreak(stor) {
  const goals = stor.goals||{}, dp = stor.dailyPositive||{}, dn = stor.dailyNegative||{};
  const today = new Date().toISOString().slice(0,10);
  const dates = Object.keys(dp).filter(d=>d<=today).sort().reverse();
  let streak = 0, prev = null;
  for (const date of dates) {
    if (prev) {
      const gap = (new Date(prev)-new Date(date))/86400e3;
      if (gap > 1) break;
    }
    const dimPos = dp[date]||{}, dimNeg = dn[date]||{};
    const pos = DIMS.reduce((s,d)=>s+(dimPos[d]||0),0);
    const neg = DIMS.reduce((s,d)=>s+(dimNeg[d]||0),0);
    const score = calcScore(pos, neg, dimPos, goals);
    if (score===null||score<60) break;
    streak++; prev=date;
  }
  return streak;
}

function getWeekAvgScore(stor) {
  const today = new Date().toISOString().slice(0,10);
  const weekStart = getWeekStart(today).toISOString().slice(0,10);
  const goals = stor.goals||{}, dp = stor.dailyPositive||{}, dn = stor.dailyNegative||{};
  const dates = Object.keys(dp).filter(d=>d>=weekStart&&d<=today);
  if (!dates.length) return null;
  let sum=0, cnt=0;
  for (const date of dates) {
    const dimPos=dp[date]||{}, dimNeg=dn[date]||{};
    const pos=DIMS.reduce((s,d)=>s+(dimPos[d]||0),0);
    const neg=DIMS.reduce((s,d)=>s+(dimNeg[d]||0),0);
    const score=calcScore(pos,neg,dimPos,goals);
    if (score!==null){sum+=score;cnt++;}
  }
  return cnt>0?Math.round(sum/cnt):null;
}

function fmtTime(sec) {
  if (!sec) return '0m';
  const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60);
  return h>0?`${h}h ${m}m`:`${m}m`;
}
function fmtDate(str) { const d=new Date(str); return `${d.getMonth()+1}/${d.getDate()}`; }

// ── Render day content ─────────────────────────────────────────────
function renderDayContent(data, stor, isYesterday) {
  const weeklyBudgetToday={};
  const todayDate=new Date(data.date), weekStart=getWeekStart(data.date);
  for (const day of (window.SCREEN_TIME_HISTORY||[])) {
    const d=new Date(day.date);
    if (d>=weekStart&&d<todayDate)
      for (const app of (day.apps||[])) {
        const cfg=getAppConfig(app.bundle,app.dimension,app.positive,stor);
        if (cfg.limitType==='weekly')
          weeklyBudgetToday[app.bundle]=(weeklyBudgetToday[app.bundle]??cfg.limitMin*60)-app.seconds;
      }
  }
  const weekCtx=getTodayWeeklyContext(data.apps,stor);
  const apps=data.apps.map(a=>({...a,_m:getMetrics(a,stor,{...weeklyBudgetToday})})).filter(a=>a._m.dim);
  const manualToday=(stor.manualEntries||{})[data.date]||{};
  const manualSec=DIMS.reduce((s,d)=>s+(manualToday[d]||0),0);

  const posSec=apps.reduce((s,a)=>s+a._m.pos,0)+manualSec;
  const negSec=apps.reduce((s,a)=>s+a._m.neg,0);
  const balance=posSec-negSec;
  const balSign=balance>=0?'+':'−';
  const balCol=balance>=0?'var(--c-pos)':'var(--c-neg)';

  const wk=getWeekSummary(stor);
  const wkBal=wk.pos-wk.neg;
  const wkCol=wkBal>=0?'var(--c-pos)':'var(--c-neg)';
  const trends=getTrends(stor);
  const goals=(stor.goals||{});

  // Dim totals (needed for score + breakdown)
  const dimPos={},dimNeg={}; DIMS.forEach(d=>{dimPos[d]=0;dimNeg[d]=0;});
  apps.forEach(a=>{if(a._m.dim){dimPos[a._m.dim]+=a._m.pos;dimNeg[a._m.dim]+=a._m.neg;}});
  DIMS.forEach(d=>dimPos[d]+=(manualToday[d]||0));

  const dd=new Date(data.date);
  const dateLabel=isYesterday?`${dd.getMonth()+1}/${dd.getDate()} 昨日`:`${dd.getMonth()+1}/${dd.getDate()} 今日`;

  // Score
  const score=calcScore(posSec,negSec,dimPos,goals);
  const grade=score!==null?getGrade(score):null;

  // Drivers
  const topPos=apps.filter(a=>a._m.pos>0).sort((a,b)=>b._m.pos-a._m.pos).slice(0,2);
  const topNeg=apps.filter(a=>a._m.neg>0).sort((a,b)=>b._m.neg-a._m.neg).slice(0,2);
  const manualDrivers=DIMS.filter(d=>manualToday[d]>0).slice(0,1).map(d=>({name:`手動·${d}`,_m:{pos:manualToday[d]}}));
  const allPos=[...topPos,...manualDrivers].slice(0,2);
  let driversHtml='';
  if (allPos.length||topNeg.length) {
    const posLines=allPos.map(a=>`<div class="driver-row"><span style="color:var(--c-pos)">▲</span><span style="color:var(--text)">${a.name}</span><span style="color:var(--text2);margin-left:4px">${fmtTime(a._m.pos)}</span></div>`).join('');
    const negLines=topNeg.map(a=>`<div class="driver-row"><span style="color:var(--c-neg)">▼</span><span style="color:var(--text)">${a.name}</span><span style="color:var(--c-neg);margin-left:4px">超標 ${fmtTime(a._m.neg)}</span></div>`).join('');
    driversHtml=`<div class="hero-drivers">${posLines}${negLines}</div>`;
  }

  // Hero
  const heroHtml=`
    <div class="hero">
      <div class="hero-date">${dateLabel}</div>
      ${score!==null?`
        <div class="hero-score" style="color:${grade.color}">${score}</div>
        <div class="hero-grade-row">
          <div class="hero-grade-chip" style="color:${grade.color};background:${grade.color}22">${grade.letter}</div>
          <div class="hero-grade-label">${grade.label}</div>
        </div>
      `:`<div class="hero-score" style="color:var(--text2)">—</div><div class="hero-grade-row"><div class="hero-grade-label" style="color:var(--text2)">尚無資料</div></div>`}
      ${driversHtml}
      <div class="hero-meta">
        <div class="hero-meta-item">
          <div class="hm-val" style="color:var(--c-pos)">${fmtTime(posSec)}</div>
          <div class="hm-key">收入</div>
        </div>
        <div class="hero-meta-item">
          <div class="hm-val" style="color:${negSec?'var(--c-neg)':'var(--text2)'}">${negSec?fmtTime(negSec):'—'}</div>
          <div class="hm-key">超支</div>
        </div>
        <div class="hero-meta-item">
          <div class="hm-val" style="color:${balCol}">${balSign}${fmtTime(Math.abs(balance))}</div>
          <div class="hm-key">結餘</div>
        </div>
      </div>
    </div>`;

  // Stats (週均分 + 連續達標)
  const weekAvg=getWeekAvgScore(stor);
  const streak=getStreak(stor);
  const statsHtml=`
    <div class="stats-row">
      <div class="stat-blk">
        <div class="stat-v">${weekAvg!==null?weekAvg:'—'}</div>
        <div class="stat-k">本週均分</div>
      </div>
      <div class="stat-blk">
        <div class="stat-v">${streak>0?`${streak} 🔥`:'0'}</div>
        <div class="stat-k">連續達標天</div>
      </div>
    </div>`;

  // Dim breakdown
  const activeDims=DIMS.filter(d=>dimPos[d]+dimNeg[d]>0);
  const maxDim=Math.max(...activeDims.map(d=>dimPos[d]+dimNeg[d]),1);

  const dimItems=activeDims.map(d=>{
    const net=dimPos[d]-dimNeg[d], col=DIM_COL[d];
    const netStr=(net>=0?'+':'−')+fmtTime(Math.abs(net));
    const netCol=net>=0?'var(--c-pos)':'var(--c-neg)';
    const barW=Math.round((dimPos[d]+dimNeg[d])/maxDim*100);
    const barCol=dimNeg[d]>dimPos[d]?'var(--c-neg)':col;
    const tr=trends[d], trColor=tr==='↑'?'var(--c-pos)':tr==='↓'?'var(--c-neg)':'var(--text2)';
    const goalMin=(goals[d]||0)*60;
    let metaStr=tr?`<span style="color:${trColor}">${tr}</span> `:'';
    if (goalMin>0) {
      if (dimPos[d]>=goalMin) metaStr+='<span style="color:var(--c-pos)">✓</span>';
      else metaStr+=`差${fmtTime(goalMin-dimPos[d])}`;
    }
    return `<div class="dim-item">
      <div class="dim-lbl">
        <span class="dim-lbl-icon">${DIM_ICON[d]}</span>
        <span class="dim-lbl-name" style="color:${col}">${d}</span>
      </div>
      <div class="dim-bar-bg"><div class="dim-bar" style="width:${barW}%;background:${barCol}"></div></div>
      <div class="dim-right">
        <div class="dim-val" style="color:${netCol}">${netStr}</div>
        ${metaStr?`<div class="dim-meta">${metaStr}</div>`:''}
      </div>
    </div>`;
  }).join('');

  const dimSection=activeDims.length?`
    <div class="dim-section">
      <div class="section-lbl">分類收支</div>
      ${dimItems}
    </div>`:'';

  // Transactions
  function txRow(a, type) {
    const m=a._m, col=DIM_COL[m.dim];
    const cfg=getAppConfig(a.bundle,a.dimension,a.positive,stor);
    const isWeekly=m.limitType==='weekly', wc=weekCtx[a.bundle];
    let meta=m.dim;
    if (m.limit!==null) meta=isWeekly&&wc?`${m.dim} · 本週 ${fmtTime(wc.weekUsed)}/${fmtTime(wc.weekLimit)}`:`${m.dim} · 限 ${cfg.limitMin}m`;
    if (type==='income') return `<div class="tx-row"><div class="tx-icon" style="background:${col}22;color:${col}">${DIM_ICON[m.dim]}</div><div class="tx-body"><div class="tx-name">${a.name}</div><div class="tx-meta">${meta}</div></div><div class="tx-amount" style="color:var(--c-pos)">+${fmtTime(m.pos)}</div></div>`;
    return `<div class="tx-row"><div class="tx-icon" style="background:var(--c-neg)22;color:var(--c-neg)">${DIM_ICON[m.dim]}</div><div class="tx-body"><div class="tx-name">${a.name}</div><div class="tx-meta">${meta}</div></div><div class="tx-amount" style="color:var(--c-neg)">−${fmtTime(m.neg)}</div></div>`;
  }

  const incomeApps=apps.filter(a=>a._m.pos>0).sort((a,b)=>b._m.pos-a._m.pos);
  const expenseApps=apps.filter(a=>a._m.neg>0).sort((a,b)=>b._m.neg-a._m.neg);
  const manualRows=DIMS.filter(d=>manualToday[d]>0).map(d=>{
    const col=DIM_COL[d];
    return `<div class="tx-row"><div class="tx-icon" style="background:${col}22;color:${col}">✏️</div><div class="tx-body"><div class="tx-name">手動記錄</div><div class="tx-meta">${d}</div></div><div class="tx-amount" style="color:var(--c-pos)">+${fmtTime(manualToday[d])}</div></div>`;
  }).join('');

  const txWrap=`<div class="tx-wrap">
    ${incomeApps.length?`<div class="tx-hdr"><div class="tx-hdr-name" style="color:var(--c-pos)">收入</div><div class="tx-hdr-total" style="color:var(--c-pos)">+${fmtTime(posSec)}</div></div>${incomeApps.map(a=>txRow(a,'income')).join('')}${manualRows}`:''}
    ${expenseApps.length?`<div class="tx-hdr${incomeApps.length?' border-top':''}"><div class="tx-hdr-name" style="color:var(--c-neg)">超支</div><div class="tx-hdr-total" style="color:var(--c-neg)">−${fmtTime(negSec)}</div></div>${expenseApps.map(a=>txRow(a,'expense')).join('')}`:''}
    ${!incomeApps.length&&!expenseApps.length&&!manualRows?'<div style="padding:24px 0;color:var(--text2);font-size:13px">今日尚無記錄</div>':''}
  </div>`;

  // Manual form
  const dateKey=data.date;
  const mfHtml=`
    <div class="manual-wrap">
      <button class="manual-btn" onclick="toggleManualForm()">${_showManual?'✕ 取消':'✏️ 手動記錄時間'}</button>
      ${_showManual?`<div class="manual-form">
        <div class="mf-title">新增時間記錄 · ${dateLabel}</div>
        <div class="mf-dim-row">${DIMS.map(d=>`<button class="mf-dim-btn${_manualDim===d?' active':''}" style="${_manualDim===d?`color:${DIM_COL[d]};border-color:${DIM_COL[d]};background:${DIM_COL[d]}22`:''}\" onclick="setManualDim('${d}')">${DIM_ICON[d]} ${d}</button>`).join('')}</div>
        <div class="mf-min-row">
          <button class="mf-step" onclick="adjManualMin(-15)">−</button>
          <div class="mf-val">${_manualMin}m</div>
          <button class="mf-step" onclick="adjManualMin(15)">＋</button>
        </div>
        <button class="mf-submit" ${_manualDim?'':'disabled'} onclick="addManualEntry('${dateKey}')">
          ${_manualDim?`記錄 ${DIM_ICON[_manualDim||'']} ${_manualDim} ${_manualMin}m`:'請先選擇維度'}
        </button>
      </div>`:''}
    </div>`;

  const toggleHtml=`<div class="detail-toggle" onclick="toggleDetails()"><span>明細</span><span class="toggle-arrow${_showDetails?' open':''}">▼</span></div>`;
  const detailHtml=_showDetails?dimSection+txWrap+mfHtml:'';
  return (isYesterday?'<div class="yesterday-banner">⚠️ 今日資料同步中，目前顯示昨日</div>':'')+heroHtml+statsHtml+toggleHtml+detailHtml;
}

// ── Render Ledger ──────────────────────────────────────────────────
function renderToday(data, stor) {
  const panel=document.getElementById('panel-today');

    panel.innerHTML=`<div class="no-data"><h2>尚無今日資料</h2><p>請先在 Terminal 執行</p><code>python3 sync.py</code></div>`;

    panel.innerHTML=`<div class="no-data"><h2>等待 iPhone 同步中</h2><p style="margin-top:8px">Biome 尚未傳入今日資料</p><p style="margin-top:12px;font-size:12px;line-height:1.6">確認 iPhone 與 Mac 在同一 Wi-Fi<br>並開啟 iCloud，稍後會自動更新</p></div>`;

}

// ── Detail toggle ─────────────────────────────────────────────────
function toggleDetails() { _showDetails=!_showDetails; renderToday(window.SCREEN_TIME_DATA,loadStor()); }

// ── Manual handlers ────────────────────────────────────────────────
function toggleManualForm() { _showManual=!_showManual; renderToday(window.SCREEN_TIME_DATA,loadStor()); }
function setManualDim(d)    { _manualDim=d; renderToday(window.SCREEN_TIME_DATA,loadStor()); }
function adjManualMin(delta){ _manualMin=Math.max(5,Math.min(480,_manualMin+delta)); renderToday(window.SCREEN_TIME_DATA,loadStor()); }
function addManualEntry(dateKey) {
  if (!_manualDim) return;
  const stor=loadStor();
  if (!stor.manualEntries) stor.manualEntries={};
  if (!stor.manualEntries[dateKey]) stor.manualEntries[dateKey]={};
  stor.manualEntries[dateKey][_manualDim]=(stor.manualEntries[dateKey][_manualDim]||0)+_manualMin*60;
  _showManual=false; _manualDim=null; _manualMin=30;
  mergeHistory(window.SCREEN_TIME_HISTORY,stor); saveStor(stor);
  renderToday(window.SCREEN_TIME_DATA,stor); renderSkillTree(stor); renderWeek(stor);
}

// ── Skill Tree ─────────────────────────────────────────────────────
function renderSkillTree(stor) {
  const sh=getSkillHours(stor);
  const sections=DIMS.map(dim=>{
    const col=DIM_COL[dim],nodes=SKILL_DEF[dim],totalH=sh[dim]||0;
    const chain=nodes.map((node,i)=>{
      const unlocked=totalH>=node.hours,isNext=!unlocked&&(i===0||totalH>=nodes[i-1].hours);
      const state=unlocked?'unlocked':isNext?'active':'locked';
      const conn=i>0?`<div class="skill-conn"></div>`:'';
      const prog=isNext?`<div class="node-prog"><div class="node-prog-fill" style="width:${Math.round(Math.min(totalH/node.hours,1)*100)}%;background:${col}"></div></div>`:'';
      const req=unlocked?`<span style="color:${col}">✓ 解鎖</span>`:`${totalH.toFixed(1)}/${node.hours}h`;
      return `${conn}<div class="skill-node"><div class="node-circle ${state}" style="color:${col}" title="${node.bonus}">${node.icon}</div>${prog}<div class="node-name">${node.name}</div><div class="node-req">${req}</div></div>`;
    }).join('');
    return `<div class="skill-section"><div class="skill-section-title" style="color:${col}">${DIM_ICON[dim]} ${dim}技能樹 <span style="font-size:11px;font-weight:400;color:var(--text2)">正面累積 ${totalH.toFixed(1)}h</span></div><div class="skill-chain">${chain}</div></div>`;
  }).join('');
  document.getElementById('panel-skill').innerHTML=`<div class="skill-wrap"><div class="card" style="font-size:12px;color:var(--text2);margin-bottom:14px">💡 在限制內使用 App 累積正面時數 · 解鎖節點給對應維度永久加成</div>${sections}</div>`;
}

// ── Report ─────────────────────────────────────────────────────────
function renderDonut(dimTotals, total, labelTop, labelBot, chartId) {
  if (!total) return `<div style="width:200px;height:200px;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:13px">無資料</div>`;
  const cx=100,cy=100,R=82,ri=50;
  let paths='',angle=-Math.PI/2;
  for (const d of DIMS) {
    const v=dimTotals[d]||0; if(!v) continue;
    const sweep=v/total*2*Math.PI;
    const x1=cx+R*Math.cos(angle),y1=cy+R*Math.sin(angle);
    const x2=cx+R*Math.cos(angle+sweep),y2=cy+R*Math.sin(angle+sweep);
    const la=sweep>Math.PI?1:0, pct=Math.round(v/total*100);
    paths+=`<path id="${chartId}-s-${d}" d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${R},${R} 0 ${la},1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${DIM_COL[d]}" style="cursor:pointer;transition:opacity .15s" onclick="donutTap('${chartId}','${d}',${v},${pct})"/>`;
    angle+=sweep;
  }
  paths+=`<circle cx="${cx}" cy="${cy}" r="${ri}" fill="var(--bg2)" style="cursor:pointer" onclick="donutReset('${chartId}','${labelTop}','${labelBot}')"/>`;
  paths+=`<text id="${chartId}-t1" x="${cx}" y="${cy-6}" text-anchor="middle" fill="var(--text)" font-size="17" font-weight="700">${labelTop}</text>`;
  paths+=`<text id="${chartId}-t2" x="${cx}" y="${cy+12}" text-anchor="middle" fill="var(--text2)" font-size="10">${labelBot}</text>`;
  return `<svg width="200" height="200" viewBox="0 0 200 200">${paths}</svg>`;
}
function donutTap(chartId,dim,secs,pct) {
  document.querySelectorAll(`[id^="${chartId}-s-"]`).forEach(el=>el.style.opacity='0.3');
  const el=document.getElementById(`${chartId}-s-${dim}`); if(el) el.style.opacity='1';
  const t1=document.getElementById(`${chartId}-t1`),t2=document.getElementById(`${chartId}-t2`);
  if(t1) t1.textContent=fmtTime(secs);
  if(t2) t2.textContent=`${DIM_ICON[dim]} ${dim} ${pct}%`;
}
function donutReset(chartId,defT1,defT2) {
  document.querySelectorAll(`[id^="${chartId}-s-"]`).forEach(el=>el.style.opacity='1');
  const t1=document.getElementById(`${chartId}-t1`),t2=document.getElementById(`${chartId}-t2`);
  if(t1) t1.textContent=defT1; if(t2) t2.textContent=defT2;
}
function setPeriod(p) { _reportPeriod=p; renderWeek(loadStor()); }

function renderWeek(stor) {
  const panel=document.getElementById('panel-week');
  const dp=stor.dailyPositive||{};
  if (!Object.keys(dp).length) { panel.innerHTML=`<div class="no-data"><h2>尚無歷史資料</h2><p>執行 sync.py 後重新整理</p></div>`; return; }
  const PERIODS=[['day','今日'],['week','本週'],['month','本月'],['year','今年']];
  const periodHtml=`<div class="period-row">${PERIODS.map(([k,l])=>`<button class="period-pill${_reportPeriod===k?' active':''}" onclick="setPeriod('${k}')">${l}</button>`).join('')}</div>`;
  const dimTotals=aggregateForPeriod(stor,_reportPeriod);
  const total=DIMS.reduce((s,d)=>s+(dimTotals[d]||0),0);
  const periodLabel={day:'今日',week:'本週',month:'本月',year:'今年'}[_reportPeriod];
  const donutHtml=`<div class="donut-wrap">${renderDonut(dimTotals,total,fmtTime(total),periodLabel+'收入','rpt')}</div>`;
  const legendHtml=DIMS.filter(d=>dimTotals[d]>0).sort((a,b)=>dimTotals[b]-dimTotals[a]).map(d=>{
    const pct=Math.round(dimTotals[d]/total*100);
    return `<div class="legend-row"><div class="l-dot" style="background:${DIM_COL[d]}"></div><span class="l-dim">${DIM_ICON[d]} ${d}</span><span class="l-pct" style="color:${DIM_COL[d]}">${pct}%</span><span class="l-time">${fmtTime(dimTotals[d])}</span></div>`;
  }).join('');

  let barCard='';
  if (_reportPeriod!=='year') {
    const now=new Date(),todayStr=now.toISOString().slice(0,10);
    let start;
    if (_reportPeriod==='day')   start=todayStr;
    else if(_reportPeriod==='week')  start=getWeekStart(todayStr).toISOString().slice(0,10);
    else start=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
    const days=Object.keys(dp).filter(d=>d>=start&&d<=todayStr).sort();
    if (days.length>1) {
      const maxSec=Math.max(...days.map(d=>DIMS.reduce((s,dim)=>s+(dp[d][dim]||0),0)),1);
      const activeDims=DIMS.filter(d=>days.some(day=>(dp[day]||{})[d]>0));
      const legend=activeDims.map(d=>`<div class="chart-leg-item"><div class="chart-leg-dot" style="background:${DIM_COL[d]}"></div>${DIM_ICON[d]} ${d}</div>`).join('');
      const bars=days.map(day=>{
        const dd=dp[day]||{},tot=DIMS.reduce((s,d)=>s+(dd[d]||0),0);
        const segs=DIMS.map(dim=>{const v=dd[dim]||0,pct=(v/maxSec*100).toFixed(1);return v>0?`<div class="hbar-seg" style="width:${pct}%;background:${DIM_COL[dim]}" title="${dim} ${fmtTime(v)}"></div>`:''}).join('');
        return `<div class="hbar-row"><div class="hbar-label">${fmtDate(day)}</div><div class="hbar-track">${segs}</div><div class="hbar-total">${tot?fmtTime(tot):'—'}</div></div>`;
      }).join('');
      barCard=`<div class="chart-card"><div class="chart-title">每日收入分佈</div><div class="chart-legend">${legend}</div>${bars}</div>`;
    }
  }
  panel.innerHTML=`<div class="report-pad">${periodHtml}<div class="donut-card">${donutHtml}<div class="legend-list">${legendHtml||'<div style="color:var(--text2);font-size:13px">此期間尚無資料</div>'}</div></div>${barCard}</div>`;
}

// ── Settings ───────────────────────────────────────────────────────
function renderSettings() {
  const panel=document.getElementById('panel-settings');
  const stor=loadStor();
  const goals=stor.goals||{};

  const goalRows=DIMS.map(d=>{
    const val=goals[d]||0, bid=`goal-${d}`;
    return `<div class="goal-set-row">
      <div class="goal-set-dim">${DIM_ICON[d]} ${d}</div>
      <button class="step-btn" onclick="adjGoal('${d}',-15)">−</button>
      <div class="goal-set-val${val>0?' active':''}" id="${bid}">${val>0?`${val}m/日`:'未設定'}</div>
      <button class="step-btn" onclick="adjGoal('${d}',15)">+</button>
    </div>`;
  }).join('');

  const appMap=new Map();
  for (const day of (window.SCREEN_TIME_HISTORY||[]))
    for (const app of (day.apps||[]))
      if (!appMap.has(app.bundle)) appMap.set(app.bundle,{name:app.name,syncDim:app.dimension,syncPos:app.positive,totalSecs:0}),appMap.get(app.bundle).totalSecs+=app.seconds; else appMap.get(app.bundle).totalSecs+=app.seconds;

  const appRows=[...appMap.entries()].sort((a,b)=>b[1].totalSecs-a[1].totalSecs).map(([bundle,info])=>{
    const cfg=getAppConfig(bundle,info.syncDim,info.syncPos,stor);
    const col=DIM_COL[cfg.dimension]||'var(--text2)',icon=DIM_ICON[cfg.dimension]||'❓';
    const bid=bundle.replace(/\./g,'__');
    const dimPills=[...DIMS,'skip'].map(d=>{
      const isSkip=d==='skip',isActive=isSkip?cfg.type==='skip':cfg.dimension===d;
      const label=isSkip?'略過':d, btnCol=isSkip?'var(--text2)':(DIM_COL[d]||'var(--text2)');
      return `<button class="dim-pill${isActive?' active':''}${isSkip?' skip-pill':''}" style="${isActive&&!isSkip?`color:${btnCol};border-color:${btnCol}`:''}" onclick="setAppDim('${bundle}','${d}')">${label}</button>`;
    }).join('');
    let typeRow='';
    if (cfg.type!=='skip') {
      const isWeekly=cfg.limitType==='weekly';
      const limitLabel=isWeekly?`${Math.round(cfg.limitMin/60*10)/10}h/週`:`${cfg.limitMin}m/日`;
      const stepperMin=isWeekly?30:5;
      typeRow=`<div class="type-row">
        <button class="type-pill${cfg.type==='positive'?' active':''}" onclick="setAppType('${bundle}','positive')">📈 永遠收入</button>
        <button class="type-pill${cfg.type==='limit'?' active':''}" onclick="setAppType('${bundle}','limit')">⏱ 有預算</button>
        <button class="type-pill${cfg.type==='negative'?' active':''}" onclick="setAppType('${bundle}','negative')">📉 永遠超支</button>
        ${cfg.type==='limit'?`<div style="display:flex;align-items:center;gap:5px;margin-left:2px">
          <button class="step-btn" onclick="adjLimit('${bundle}',-${stepperMin})" style="font-size:14px">−</button>
          <span class="lim-val" id="lv-${bid}">${limitLabel}</span>
          <button class="step-btn" onclick="adjLimit('${bundle}',${stepperMin})" style="font-size:14px">+</button>
          <button class="type-pill${isWeekly?' active':''}" style="padding:3px 8px;font-size:11px" onclick="toggleWeekly('${bundle}')">${isWeekly?'週':'日'}</button>
        </div>`:''}
      </div>`;
    }
    return `<div class="s-app"><div class="s-row1"><div class="app-icon" style="background:${col}22;color:${col};width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">${icon}</div><div class="s-name-block"><div class="s-name">${info.name}</div><div class="s-usage">${fmtTime(info.totalSecs)} (7天)</div></div></div><div class="dim-pills">${dimPills}</div>${typeRow}</div>`;
  }).join('');

  panel.innerHTML=`<div class="settings-pad">
    <div class="card" style="margin-bottom:12px"><div class="card-title">每日目標（達標在帳本顯示 ✓）</div>${goalRows}</div>
    <div class="card" style="font-size:12px;color:var(--text2);margin-bottom:12px">⚙️ 選維度、計分方式，以及日/週預算。</div>
    ${appMap.size?`<div class="card"><div class="card-title">App 設定（依 7 天使用量排序）</div>${appRows}</div>`:`<div class="no-data"><h2>尚無 App 資料</h2><p>執行 sync.py 後重新整理</p></div>`}
  </div>`;
}

// ── Settings handlers ──────────────────────────────────────────────
function adjGoal(dim, delta) {
  const stor=loadStor(); if (!stor.goals) stor.goals={};
  stor.goals[dim]=Math.max(0,Math.min(480,(stor.goals[dim]||0)+delta));
  saveStor(stor);
  const el=document.getElementById(`goal-${dim}`);
  if (el) { const v=stor.goals[dim]; el.textContent=v>0?`${v}m/日`:'未設定'; el.className=`goal-set-val${v>0?' active':''}`; }
  renderToday(window.SCREEN_TIME_DATA,stor);
}
function setAppDim(bundle,dim) {
  const stor=loadStor(); if(!stor.appConfig) stor.appConfig={};
  const cur=stor.appConfig[bundle]||{}, def=DEFAULT_LIMITS[bundle];
  if (dim==='skip') stor.appConfig[bundle]={...cur,type:'skip',dimension:null};
  else { const type=(cur.type==='skip'||!cur.type)?'limit':cur.type; const lt=cur.limitType||(def?.limitType)||(dim==='社交'?'weekly':'daily'); const lm=cur.limitMin||(def?.limitMin)||30; stor.appConfig[bundle]={...cur,dimension:dim,type,limitMin:lm,limitType:lt}; }
  applyAndRender(stor);
}
function setAppType(bundle,type) {
  const stor=loadStor(); if(!stor.appConfig) stor.appConfig={};
  const cur=stor.appConfig[bundle]||{}, def=DEFAULT_LIMITS[bundle];
  stor.appConfig[bundle]={...cur,type,limitMin:cur.limitMin||(def?.limitMin)||30,limitType:cur.limitType||(def?.limitType)||'daily'};
  applyAndRender(stor);
}
function toggleWeekly(bundle) {
  const stor=loadStor(); if(!stor.appConfig) stor.appConfig={};
  const cur=stor.appConfig[bundle]||{}, newType=cur.limitType==='weekly'?'daily':'weekly';
  const lm=newType==='weekly'?Math.min((cur.limitMin||30)*5,1440):(cur.limitMin||150);
  stor.appConfig[bundle]={...cur,limitType:newType,limitMin:lm};
  applyAndRender(stor);
}
function adjLimit(bundle,delta) {
  const stor=loadStor(); if(!stor.appConfig) stor.appConfig={};
  const cur=stor.appConfig[bundle]||{}, isWeekly=cur.limitType==='weekly';
  const min=isWeekly?30:5, max=isWeekly?2880:360;
  const next=Math.max(min,Math.min(max,(cur.limitMin||30)+delta));
  stor.appConfig[bundle]={...cur,limitMin:next};
  const el=document.getElementById('lv-'+bundle.replace(/\./g,'__'));
  if(el) { const lbl=isWeekly?`${Math.round(next/60*10)/10}h/週`:`${next}m/日`; el.textContent=lbl; }
  mergeHistory(window.SCREEN_TIME_HISTORY,stor); saveStor(stor);
  renderToday(window.SCREEN_TIME_DATA,stor); renderSkillTree(stor); renderWeek(stor);
}
function applyAndRender(stor) {
  mergeHistory(window.SCREEN_TIME_HISTORY,stor); saveStor(stor);
  renderToday(window.SCREEN_TIME_DATA,stor); renderSkillTree(stor); renderWeek(stor); renderSettings();
}

// ── Init ───────────────────────────────────────────────────────────
function init() {
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
  const stor=loadStor();
  if (window.SCREEN_TIME_HISTORY) mergeHistory(window.SCREEN_TIME_HISTORY,stor);
  saveStor(stor);
  const info=window.SCREEN_TIME_DATA;
  document.getElementById('sync-info').textContent=info
    ?`最後同步：${new Date(info.generated).toLocaleString('zh-TW')} · ${info.date}`
    :'未找到資料 — 請執行 python3 sync.py 後重新整理';
  renderToday(info,stor); renderSkillTree(stor); renderWeek(stor); renderSettings();
}
init();
</script>
